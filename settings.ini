
# {query} 会替换为编码后的搜索词，也可直接在“搜索引擎”页面管理。
# 通用：hotkey 为唤醒快捷键；dynamicBlurFps 允许 10、30、60。
selected=Google
opacity=10
blurRadius=10
darkColor=#2C2C2C
lightColor=#FFFFFF
hotkey=Ctrl+Space
dynamicBlur=true
dynamicBlurFps=60
Google=https://www.google.com/search?q={query}
百度=https://www.baidu.com/s?wd={query}
必应=https://www.bing.com/search?q={query}
