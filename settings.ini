# 外观：opacity=0-100；blurRadius=0-40；darkColor/lightColor 使用 #RRGGBB。
selected=Google
opacity=10
blurRadius=10
darkColor=#383838
lightColor=#FFFFFF
Baidu=https://www.baidu.com/s?wd={query}
Bing=https://www.bing.com/search?q={query}
Google=https://www.google.com/search?q={query}
